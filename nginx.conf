server {
    listen 8000;
    server_name _;

    # Logs to stdout/stderr — captured by supervisor -> Cloudron log viewer
    access_log /dev/stdout;
    error_log stderr;

    # Health check endpoint - no auth required
    location /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Static assets (CSS/JS are not sensitive)
    location /css/ {
        alias /app/code/smokeping/htdocs/css/;
    }

    location /js/ {
        alias /app/code/smokeping/htdocs/js/;
    }

    # SmokePing cache (generated graphs) - auth required
    location /cache/ {
        auth_basic "SmokePing";
        auth_basic_user_file /app/data/htpasswd;
        alias /app/data/cache/;
    }

    # SmokePing FastCGI
    location / {
        auth_basic "SmokePing";
        auth_basic_user_file /app/data/htpasswd;

        fastcgi_pass unix:/run/smokeping/fcgi.sock;
        fastcgi_param SCRIPT_NAME /smokeping.fcgi;
        fastcgi_param SCRIPT_FILENAME /app/code/smokeping/bin/smokeping_cgi;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param QUERY_STRING $query_string;
        fastcgi_param REQUEST_METHOD $request_method;
        fastcgi_param CONTENT_TYPE $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param SERVER_PROTOCOL $server_protocol;
        fastcgi_param GATEWAY_INTERFACE CGI/1.1;
        fastcgi_param SERVER_SOFTWARE nginx;
        fastcgi_param REMOTE_ADDR $remote_addr;
        fastcgi_param REMOTE_PORT $remote_port;
        fastcgi_param SERVER_ADDR $server_addr;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param SERVER_NAME $server_name;
        fastcgi_param HTTP_HOST $http_host;
    }
}
